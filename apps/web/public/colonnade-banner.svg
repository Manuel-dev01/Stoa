<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0807"/>

  <defs>
    <linearGradient id="col" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(245,149,56,0.0)" />
      <stop offset="0.6" stop-color="rgba(245,149,56,0.10)" />
      <stop offset="1" stop-color="rgba(245,149,56,0.18)" />
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(245,149,56,0.18)" />
      <stop offset="1" stop-color="rgba(245,149,56,0)" />
    </linearGradient>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="transparent" />
      <circle cx="1" cy="1" r="0.3" fill="rgba(245,235,220,0.04)" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grain)" />

